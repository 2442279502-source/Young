<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能图片检测 - YOLO Demo</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- ========== 顶部标题栏 ========== -->
    <header class="header">
        <h1>🔍 智能图片目标检测</h1>
        <p class="subtitle">上传一张图片，AI 帮你自动识别图中的物体</p>
        <p class="tech-note">基于 YOLOv8 深度学习模型 | 支持 80 种常见物体</p>
    </header>

    <!-- ========== 主内容区 ========== -->
    <main class="main-container">

        <!-- 左侧：上传区 -->
        <section class="panel upload-panel">
            <h2>📤 上传图片</h2>

            <!-- 拖拽/点击上传区域 -->
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-content">
                    <span class="drop-icon">🖼️</span>
                    <p>点击选择图片 或 拖拽图片到这里</p>
                    <p class="hint">支持 JPG、PNG、WEBP 格式</p>
                </div>
                <input type="file" id="fileInput" accept="image/*" hidden>
            </div>

            <!-- 原始图片预览 -->
            <div class="preview-section" id="previewSection" style="display: none;">
                <h3>原始图片</h3>
                <img id="originalPreview" alt="原始图片预览">
            </div>

            <!-- 检测按钮 -->
            <button class="btn btn-detect" id="detectBtn" disabled>
                🚀 开始检测
            </button>
            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>AI 正在分析图片中...</p>
            </div>
        </section>

        <!-- 右侧：结果区 -->
        <section class="panel result-panel">
            <h2>📊 检测结果</h2>

            <!-- 无结果时的占位提示 -->
            <div class="empty-state" id="emptyState">
                <span class="empty-icon">📭</span>
                <p>还没有检测结果</p>
                <p class="hint">上传一张图片开始检测吧！</p>
            </div>

            <!-- 检测结果展示 -->
            <div class="result-content" id="resultContent" style="display: none;">
                <!-- 标注后的图片 -->
                <div class="result-image-section">
                    <h3>标注结果</h3>
                    <img id="resultImage" alt="检测结果图片">
                </div>

                <!-- 检测统计 -->
                <div class="result-stats" id="resultStats">
                    <h3>检测详情</h3>
                    <div class="stats-summary" id="statsSummary"></div>
                    <ul class="object-list" id="objectList"></ul>
                </div>
            </div>
        </section>
    </main>

    <!-- ========== 底部 ========== -->
    <footer class="footer">
        <p>YOLOv8 目标检测 Demo | 简历项目 | 基于 Ultralytics 框架</p>
    </footer>

    <!-- 前端交互脚本 -->
    <script src="/static/script.js"></script>
</body>
</html>
